name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Test + Format + Warnings + Migration drift
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: intellispark_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      POSTGRES_HOST: localhost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: intellispark_test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18.4'
          otp-version: '27.3.4.10'

      - name: Cache deps + _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Fetch deps
        run: mix deps.get

      - name: Format check
        run: mix format --check-formatted

      - name: Compile with warnings-as-errors
        run: mix compile --warnings-as-errors

      - name: Migration drift check
        run: mix ash.codegen --check

      - name: Create test DB
        run: mix ecto.create

      - name: Migrate test DB
        run: mix ash.migrate

      - name: Run tests
        run: mix test 2>&1 | tee test_output.log
        shell: bash

      - name: Record test stats
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        run: |
          PASSING=$(grep -oE "[0-9]+ tests?" test_output.log | tail -1 | awk '{print $1}')
          FAILING=$(grep -oE "[0-9]+ failures?" test_output.log | tail -1 | awk '{print $1}')
          PROPS=$(grep -oE "[0-9]+ propert(y|ies)" test_output.log | tail -1 | awk '{print $1}')
          cat > priv/test_stats.json <<EOF
          {
            "passing": ${PASSING:-0},
            "failing": ${FAILING:-0},
            "properties": ${PROPS:-0},
            "commit_sha": "${GITHUB_SHA:0:7}",
            "recorded_at": $(date +%s)
          }
          EOF
          cat priv/test_stats.json

      - name: Commit test stats back to main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add priv/test_stats.json
          if git diff --cached --quiet; then
            echo "No test_stats.json changes to commit"
          else
            git commit -m "ci: update test_stats.json [skip ci]"
            git push
          fi
