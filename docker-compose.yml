services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${APP_TARGET:-dev}
    image: intellispark:${APP_TARGET:-dev}
    env_file: .env
    # Share the host's network namespace so the app reaches the shared
    # host Postgres at localhost:5432 directly (no bridge DNS, no port
    # publishing). The container effectively IS the host at the network
    # layer — Phoenix binds to the host's ${PORT:-4800} directly.
    network_mode: host
    restart: unless-stopped
    volumes:
      - .:/app
      - deps:/app/deps
      - build:/app/_build
      - static_assets:/app/priv/static/assets
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4800/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  deps:
  build:
  static_assets:
